name: Weekly Data Crawl

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: unesco

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: unesco/package-lock.json

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Crawl Hyecho packages
        run: npx tsx scripts/crawl-all-hyecho.ts

      - name: Fetch UNESCO sites
        run: npx tsx scripts/fetch-unesco.ts
        timeout-minutes: 3

      - name: Enrich missing locations
        run: npx tsx scripts/enrich-locations.ts
        timeout-minutes: 3

      - name: Validate crawl results
        id: validate
        run: |
          OLD_COUNT=$(git show HEAD:unesco/data/hyecho-packages.json | jq 'length' 2>/dev/null || echo 0)
          NEW_COUNT=$(jq 'length' data/hyecho-packages.json 2>/dev/null || echo 0)
          echo "old=$OLD_COUNT new=$NEW_COUNT"
          THRESHOLD=$(( OLD_COUNT * 80 / 100 ))
          if [ "$NEW_COUNT" -lt "$THRESHOLD" ] && [ "$OLD_COUNT" -gt 0 ]; then
            echo "FAIL: $NEW_COUNT products < 80% of previous $OLD_COUNT — restoring old data"
            git checkout -- data/hyecho-packages.json
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          else
            echo "OK: $NEW_COUNT products (was $OLD_COUNT)"
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for data changes
        id: changes
        if: steps.validate.outputs.healthy == 'true'
        run: |
          git diff --name-only -- data/ | head -20
          if git diff --quiet -- data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push data
        if: steps.validate.outputs.healthy == 'true' && steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: weekly data refresh $(date +%Y-%m-%d)"
          git push

      - name: Deploy to Vercel
        if: steps.validate.outputs.healthy == 'true'
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_VuiqYkZq4TGlfLliNh9Pb68W
          VERCEL_PROJECT_ID: prj_hQsE4ugnnlRWj7PWjbZLBx19pezw
