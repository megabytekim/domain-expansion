<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1200px; height:630px; overflow:hidden;
  background:#080808;
  font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  position:relative;
}
/* 격자 배경 */
body::before {
  content:'';
  position:absolute; inset:0;
  background-image:
    linear-gradient(#111 1px, transparent 1px),
    linear-gradient(90deg, #111 1px, transparent 1px);
  background-size:60px 60px;
  opacity:.5;
}
/* 테두리 */
body::after {
  content:'';
  position:absolute; inset:18px;
  border:1px solid #1e1e1e;
  pointer-events:none;
}
.inner {
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center; gap:24px;
}
.tag {
  font-size:11px; letter-spacing:.2em; color:#3a3a3a;
  text-transform:uppercase;
  border:1px solid #1e1e1e; padding:5px 14px;
  font-family:'SF Mono','JetBrains Mono','Menlo',monospace;
}
.main-title {
  font-size:130px; font-weight:800; line-height:1;
  color:#e8e8e8;
  letter-spacing:-.02em;
}
.sub {
  font-size:22px; letter-spacing:.18em; color:#3a3a3a;
  text-transform:uppercase;
  font-family:'SF Mono','JetBrains Mono','Menlo',monospace;
}
.badges {
  display:flex; gap:10px; margin-top:4px;
}
.badge {
  font-size:12px; letter-spacing:.12em;
  padding:4px 12px; border-radius:2px;
  font-family:'SF Mono','JetBrains Mono','Menlo',monospace;
}
.badge.blue { background:#001a2e; color:#3b8ecf; border:1px solid #1a3a5c; }
.badge.green { background:#001a0e; color:#2ecc71; border:1px solid #0d3320; }
.badge.dim { background:#111; color:#444; border:1px solid #1e1e1e; }
/* 코너 데코 */
.corner {
  position:absolute; width:14px; height:14px;
  border-color:#2a2a2a; border-style:solid;
}
.corner.tl { top:30px; left:30px; border-width:1px 0 0 1px; }
.corner.tr { top:30px; right:30px; border-width:1px 1px 0 0; }
.corner.bl { bottom:30px; left:30px; border-width:0 0 1px 1px; }
.corner.br { bottom:30px; right:30px; border-width:0 1px 1px 0; }
</style>
</head>
<body>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="inner">
    <div class="tag">TAIPEI TRIP MONITOR</div>
    <div class="main-title">착착</div>
    <div class="sub">Taiwan · 2026.05.01 — 05</div>
    <div class="badges">
      <span class="badge blue">2026.05.01–05</span>
      <span class="badge green">10명</span>
      <span class="badge dim">D-7</span>
    </div>
  </div>
</body>
</html>
