<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141210"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#c4a76c"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4a76c"/>
      <stop offset="60%" stop-color="#8a7e6e"/>
      <stop offset="100%" stop-color="#5a5347"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- inner border -->
  <rect x="20" y="20" width="1160" height="590" rx="2" fill="none" stroke="#2a2520" stroke-width="1"/>

  <!-- Eiffel Tower (centered at x=600) -->
  <g transform="translate(600, 50)" fill="url(#tower)" stroke="none">
    <!-- antenna/spire -->
    <rect x="-2" y="0" width="4" height="50"/>
    <!-- top dome -->
    <ellipse cx="0" cy="50" rx="10" ry="6"/>
    <!-- upper section -->
    <polygon points="-10,50 10,50 22,140 -22,140"/>
    <!-- first platform -->
    <rect x="-30" y="136" width="60" height="8" rx="1"/>
    <!-- middle section -->
    <polygon points="-22,144 22,144 50,260 -50,260"/>
    <!-- arch cutout middle -->
    <ellipse cx="0" cy="250" rx="20" ry="18" fill="#141210"/>
    <!-- second platform -->
    <rect x="-58" y="256" width="116" height="8" rx="1"/>
    <!-- lower section -->
    <polygon points="-50,264 50,264 110,430 -110,430"/>
    <!-- arch cutout lower -->
    <ellipse cx="0" cy="410" rx="50" ry="35" fill="#141210"/>
    <!-- base platform -->
    <rect x="-118" y="426" width="236" height="10" rx="2"/>
    <!-- left leg -->
    <polygon points="-110,436 -58,264 -50,264 -90,436"/>
    <!-- right leg -->
    <polygon points="110,436 58,264 50,264 90,436"/>
    <!-- left foot -->
    <path d="M-118,436 Q-130,436 -135,450 L-135,460 Q-135,465 -128,465 L-85,465 Q-80,465 -80,458 L-80,436 Z"/>
    <!-- right foot -->
    <path d="M118,436 Q130,436 135,450 L135,460 Q135,465 128,465 L85,465 Q80,465 80,458 L80,436 Z"/>
    <!-- cross beams -->
    <rect x="-35" y="180" width="70" height="3" rx="1" opacity="0.5"/>
    <rect x="-42" y="210" width="84" height="3" rx="1" opacity="0.5"/>
    <rect x="-65" y="310" width="130" height="3" rx="1" opacity="0.4"/>
    <rect x="-80" y="350" width="160" height="3" rx="1" opacity="0.4"/>
    <rect x="-95" y="390" width="190" height="3" rx="1" opacity="0.3"/>
  </g>

  <!-- sparkle dots around tower -->
  <circle cx="520" cy="120" r="2" fill="#c4a76c" opacity="0.6"/>
  <circle cx="690" cy="90" r="1.5" fill="#c4a76c" opacity="0.4"/>
  <circle cx="480" cy="200" r="1.5" fill="#c4a76c" opacity="0.5"/>
  <circle cx="730" cy="180" r="2" fill="#c4a76c" opacity="0.3"/>
  <circle cx="500" cy="300" r="1.5" fill="#c4a76c" opacity="0.4"/>
  <circle cx="710" cy="280" r="1.5" fill="#c4a76c" opacity="0.5"/>
  <circle cx="460" cy="380" r="2" fill="#c4a76c" opacity="0.3"/>
  <circle cx="750" cy="350" r="1.5" fill="#c4a76c" opacity="0.4"/>

  <!-- text: 전시번개 -->
  <text x="600" y="568" text-anchor="middle" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="url(#gold)">전시번개</text>

  <!-- subtitle -->
  <text x="600" y="600" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#8a7e6e" letter-spacing="6">2025. 4. 25. SAT · 압구정</text>
</svg>
