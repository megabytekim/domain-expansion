// Marker & line management
let markerObjs = [];
let lineIds = [];
let currentFilter = 'all';
const dayCoords = {};

function createMarkerEl(color, num) {
  const el = document.createElement('div');
  const size = 30;
  el.style.cssText = `width:${size}px;height:${size}px;border-radius:50%;background:${color};border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;cursor:pointer;`;
  if (num) {
    const span = document.createElement('span');
    span.textContent = num;
    span.style.cssText = `color:#fff;font-size:${num>9?'11':'12'}px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,0.3);`;
    el.appendChild(span);
  }
  return el;
}

function addAllMarkers() {
  markerObjs.forEach(m => m.marker.remove());
  markerObjs = [];
  Object.keys(dayCoords).forEach(k => delete dayCoords[k]);

  places.forEach(p => {
    const el = createMarkerEl(colors[p.day], p.o);
    const gmapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.q)}`;
    const timeHtml = p.time ? `<div class="time-tag">${p.time}</div>` : '';
    const popupHtml = `<div class="popup-inner"><h3>${p.name}</h3><div class="cn-name">${p.cn}</div>${timeHtml}<div class="desc">${p.desc}</div><a href="${gmapsUrl}" target="_blank" class="gmaps-btn">Google Maps에서 열기</a></div>`;

    const marker = new maptilersdk.Marker({ element: el })
      .setLngLat([p.lng, p.lat])
      .setPopup(new maptilersdk.Popup({ offset: 18, maxWidth: '280px' }).setHTML(popupHtml))
      .addTo(map);

    markerObjs.push({ marker, day: p.day });
    if (!dayCoords[p.day]) dayCoords[p.day] = [];
    dayCoords[p.day].push([p.lng, p.lat]);
  });
}

function addAllLines() {
  lineIds.forEach(id => { if (map.getLayer(id)) map.removeLayer(id); if (map.getSource(id)) map.removeSource(id); });
  lineIds = [];
  const lineColors = {'1':'#4285F4','2':'#34A853','3':'#FBBC04','4':'#EA4335','5':'#9C27B0'};
  Object.keys(lineColors).forEach(day => {
    if (!dayCoords[day]) return;
    const id = 'route-' + day;
    map.addSource(id, { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: dayCoords[day] } } });
    map.addLayer({ id, type: 'line', source: id, paint: { 'line-color': lineColors[day], 'line-width': 3, 'line-opacity': 0.5, 'line-dasharray': [4, 4] } });
    lineIds.push(id);
  });
}

function applyCurrentFilter() { filterDay(currentFilter); }

function filterDay(day) {
  currentFilter = day;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.filter-btn[data-day="${day}"]`).classList.add('active');

  markerObjs.forEach(m => {
    const el = m.marker.getElement();
    el.style.display = (day === 'all' || m.day === day) ? 'flex' : 'none';
  });

  lineIds.forEach(id => {
    const d = id.replace('route-', '');
    if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', (day === 'all' || d === day) ? 'visible' : 'none');
  });

  if (day !== 'all' && dayCoords[day]) {
    const bounds = new maptilersdk.LngLatBounds();
    dayCoords[day].forEach(c => bounds.extend(c));
    map.fitBounds(bounds, { padding: 80 });
  } else if (day === 'all') {
    map.flyTo({ center: [121.55, 25.05], zoom: 10 });
  }
}

map.on('load', () => {
  addAllMarkers();
  addAllLines();
});
</script>
