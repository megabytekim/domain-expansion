function switchMap(style) {

];

// Create markers
const markers = [];
const dayGroups = {};

places.forEach(p => {
  const icon = makeIcon(colors[p.day], p.o);
  const gmapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.q)}`;

  let timeHtml = p.time ? `<div class="time-tag">${p.time}</div>` : '';
  let popup = `
    <div class="popup-inner">
      <h3>${p.name}</h3>
      <div class="cn-name">${p.cn}</div>
      ${timeHtml}
      <div class="desc">${p.desc}</div>
      <a href="${gmapsUrl}" target="_blank" class="gmaps-btn">Google Maps에서 열기</a>
    </div>
  `;

  const marker = L.marker([p.lat, p.lng], { icon }).bindPopup(popup);
  marker._dayTag = p.day;
  marker.addTo(map);
  markers.push(marker);

  if (!dayGroups[p.day]) dayGroups[p.day] = [];
  dayGroups[p.day].push([p.lat, p.lng]);
});

// Draw route lines per day
const routeLines = {};
const lineColors = { '1':'#4285F4','2':'#34A853','3':'#FBBC04','4':'#EA4335','5':'#9C27B0' };
Object.keys(lineColors).forEach(day => {
  if (dayGroups[day]) {
    routeLines[day] = L.polyline(dayGroups[day], {
      color: lineColors[day], weight: 3, opacity: 0.5, dashArray: '8,8'
    }).addTo(map);
  }
});

// Filter
function filterDay(day) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.filter-btn[data-day="${day}"]`).classList.add('active');

  markers.forEach(m => {
    if (day === 'all' || m._dayTag === day) {
      m.addTo(map);
    } else {
      map.removeLayer(m);
    }
  });

  Object.keys(routeLines).forEach(d => {
    if (day === 'all' || d === day) {
      routeLines[d].addTo(map);
    } else {
      map.removeLayer(routeLines[d]);
    }
  });

  // Zoom to filtered markers
  if (day !== 'all' && dayGroups[day]) {
    map.fitBounds(dayGroups[day], { padding: [60, 60] });
  } else if (day === 'all') {
    map.setView([25.05, 121.55], 11);
  }
}
</script>
</body>
