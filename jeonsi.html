<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전시번개</title>
<meta property="og:title" content="전시번개 — 4월 옥션 번개">
<meta property="og:description" content="2025.4.25 SAT 압구정 · K옥션 프리뷰 + 페로탕 10주년 · 그림 보고 밥 먹자">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0a0a;
    color: #f5f0e8;
    font-family: 'Noto Serif KR', serif;
    overflow-x: hidden;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* 클릭 전 오버레이 */
  .click-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: #0a0a0a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  .click-overlay.hidden {
    opacity: 0; visibility: hidden; pointer-events: none;
  }
  .click-overlay .prompt {
    font-size: clamp(1.2rem, 3vw, 2rem);
    color: #f5f0e8;
    letter-spacing: 0.3em;
    animation: pulse 2s ease-in-out infinite;
  }
  .click-overlay .emoji {
    font-size: 4rem;
    margin-bottom: 2rem;
    animation: bounce 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  /* 메인 카드 */
  .invitation {
    max-width: 560px;
    width: 90%;
    padding: 3rem 2.5rem;
    background: linear-gradient(145deg, #1a1714, #0f0d0b);
    border: 1px solid #3a3530;
    border-radius: 2px;
    position: relative;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1s ease 0.3s, transform 1s ease 0.3s;
  }
  .invitation.visible {
    opacity: 1; transform: translateY(0);
  }

  .invitation::before {
    content: '';
    position: absolute; inset: 8px;
    border: 1px solid #2a2520;
    border-radius: 1px;
    pointer-events: none;
  }

  .date-line {
    text-align: center;
    font-size: 0.85rem;
    letter-spacing: 0.5em;
    color: #8a7e6e;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  h1 {
    font-family: 'Playfair Display', 'Noto Serif KR', serif;
    font-size: clamp(2.5rem, 7vw, 3.8rem);
    text-align: center;
    line-height: 1.2;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #f5f0e8, #c4a76c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    text-align: center;
    font-size: 1.1rem;
    color: #c4a76c;
    margin-bottom: 2.5rem;
    font-style: italic;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: #c4a76c;
    margin: 0 auto 2.5rem;
  }

  /* 갤러리 카드 */
  .galleries {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    margin-bottom: 2.5rem;
  }

  .gallery-card {
    display: block;
    padding: 1.4rem 1.6rem;
    background: rgba(196, 167, 108, 0.06);
    border: 1px solid #2a2520;
    border-radius: 2px;
    text-decoration: none;
    color: #f5f0e8;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .gallery-card:hover {
    border-color: #c4a76c;
    background: rgba(196, 167, 108, 0.12);
    transform: translateX(4px);
  }
  .gallery-card::after {
    content: '\2197';
    position: absolute;
    right: 1.4rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.2rem;
    color: #c4a76c;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .gallery-card:hover::after { opacity: 1; }

  .gallery-card .num {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: #c4a76c;
    margin-bottom: 0.4rem;
  }
  .gallery-card .name {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .gallery-card .desc {
    font-size: 0.82rem;
    color: #8a7e6e;
  }

  .footer-note {
    text-align: center;
    font-size: 0.8rem;
    color: #5a5347;
    line-height: 1.8;
  }

  /* 음표 파티클 */
  .note {
    position: fixed;
    font-size: 1.6rem;
    pointer-events: none;
    z-index: 50;
    animation: float-up 3s ease-out forwards;
  }
  @keyframes float-up {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-300px) rotate(360deg); }
  }

  /* 이퀄라이저 */
  .equalizer {
    display: flex;
    gap: 3px;
    justify-content: center;
    margin-bottom: 1.5rem;
    height: 30px;
    align-items: flex-end;
  }
  .eq-bar {
    width: 4px;
    background: #c4a76c;
    border-radius: 2px;
    transition: height 0.1s;
  }

  .music-label {
    text-align: center;
    font-size: 0.75rem;
    color: #5a5347;
    letter-spacing: 0.2em;
    margin-bottom: 2rem;
  }

</style>
</head>
<body>

<!-- 클릭 유도 -->
<div class="click-overlay" id="overlay">
  <div class="emoji">🖼️</div>
  <div class="prompt">아무 데나 누르세요</div>
</div>

<!-- 초대장 -->
<div class="invitation" id="card">
  <div class="date-line">2025. 4. 25. SAT &middot; 압구정</div>

  <h1>전시번개</h1>
  <p class="subtitle">4월 옥션 번개</p>

  <div class="divider"></div>

  <div class="equalizer" id="eq">
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>
  </div>
  <div class="music-label" id="musicLabel">Joe Dassin — Les Champs-Elysees</div>

  <div class="galleries">
    <a class="gallery-card" href="https://www.k-auction.com/" target="_blank" rel="noopener">
      <div class="num">STOP 01</div>
      <div class="name">K옥션 프리뷰</div>
      <div class="desc">압구정 &middot; 4/18 - 4/29 프리뷰 기간</div>
    </a>
    <a class="gallery-card" href="https://www.perrotin.com/en" target="_blank" rel="noopener">
      <div class="num">STOP 02</div>
      <div class="name">페로탕 서울 10주년</div>
      <div class="desc">박서보, 무라카미 다카시 등 소속 작가 총출동 &middot; 10th Anniversary</div>
    </a>
  </div>

  <div class="divider"></div>

  <div class="footer-note">
    관람 전후로 프랑스 식 식사 한 끼<br>
    그림 보고 밥 먹자<br>
    <span style="font-size:1.2rem">🥂</span>
  </div>
</div>

<script>
// ── Les Champs-Élysées — Key: F major, ~90 BPM ──
// Melody from MIDI (bitmidi.com/les-champs-elysees-mid, clarinet track)
// Bass/chords from MIDI bass + piano tracks
// Descending bass: F-E-D-C-Bb-A-G-C

const N = {
  // Octave 2-3 (bass)
  F2:87.31, G2:98.00, A2:110.00, Bb2:116.54, C3:130.81, D3:146.83, E3:164.81, F3:174.61,
  // Octave 3-4
  G3:196.00, A3:220.00, Bb3:233.08, C4:261.63, Cs4:277.18, D4:293.66,
  Eb4:311.13, E4:329.63, F4:349.23, G4:392.00, Gs4:415.30, A4:440.00, Bb4:466.16,
  // Octave 5
  C5:523.25, D5:587.33, E5:659.25, F5:698.46, G5:783.99, A5:880.00, Bb5:932.33, C6:1046.50
};

// Chord voicings
const CHORDS = {
  F:   [N.F3, N.A3, N.C4],
  CE:  [N.E3, N.C4, N.G4],     // C/E
  Dm:  [N.D3, N.F3, N.A3],
  F7C: [N.C3, N.Eb4, N.A3],    // F7/C
  Bb:  [N.Bb2, N.D4, N.F4],
  FA:  [N.A2, N.C4, N.F4],     // F/A
  G7:  [N.G2, N.B3=246.94, N.D4, N.F4],
  C7:  [N.C3, N.E3, N.Bb3],
};

const BEAT = 0.55; // ~109 BPM, 느리게

// ── Verse melody (F major, ascending-descending pattern) ──
const verse = [
  // "Je m'ba-la-dais sur l'a-ve-nue" (F → C/E)
  [N.C4,0.5],[N.C4,0.5],[N.D4,0.5],[N.E4,0.5],[N.F4,1],[N.E4,0.5],[N.D4,0.5],
  // "le cœur ou-vert à l'in-con-nu" (Dm → F7/C)
  [N.E4,0.5],[N.D4,0.5],[N.C4,0.5],[N.Bb3,0.5],[N.C4,1.5],
  [null,0.5],
  // "j'a-vais en-vie de dire bon-jour" (Bb → F/A)
  [N.C4,0.5],[N.C4,0.5],[N.D4,0.5],[N.E4,0.5],[N.F4,1],[N.E4,0.5],[N.D4,0.5],
  // "à n'im-por-te qui" (G7 → C7)
  [N.E4,0.5],[N.F4,0.5],[N.G4,0.5],[N.F4,1.5],
  [null,1],
];

// ── Chorus melody (from MIDI clarinet track — confirmed) ──
const chorus = [
  // "Aux Champs-É-ly-sé-es" → Bb Bb Bb Bb A G
  [N.Bb4,0.5],[N.Bb4,0.3],[N.Bb4,0.5],[N.Bb4,0.5],[N.A4,0.6],[N.G4,1.2],
  [null,0.4],
  // "Au so-leil, sous la pluie" → A C A F
  [N.A4,0.6],[N.C5,0.5],[N.A4,0.6],[N.F4,1.5],
  [null,0.4],
  // "Aux Champs-É-ly-sé-es" → Bb Bb Bb Bb A F G F
  [N.Bb4,0.5],[N.Bb4,0.3],[N.Bb4,0.5],[N.Bb4,0.3],[N.A4,0.6],[N.F4,0.3],[N.G4,0.6],[N.F4,1.0],
  [null,1],

  // Repeat chorus (octave higher, from MIDI beat 168+)
  [N.Bb5,0.5],[N.Bb5,0.3],[N.Bb5,0.5],[N.Bb5,0.3],[N.A5,0.7],[N.G5,1.3],
  [null,0.4],
  [N.A5,0.6],[N.C6,0.3],[N.A5,0.6],[N.F5,1.8],
  [null,0.4],
  [N.Bb5,0.5],[N.Bb5,0.3],[N.Bb5,0.5],[N.Bb5,0.3],[N.A5,0.6],[N.F5,0.4],[N.G5,0.7],[N.F5,1.2],
];

const fullMelody = [...verse, ...chorus];

// Chord schedule (beat, chord, duration)
const chordSchedule = [
  // Verse (descending bass: F-E-D-C-Bb-A-G-C)
  [0, 'F', 3.5],
  [3.5, 'CE', 3],
  [6.5, 'Dm', 3],
  [9.5, 'F7C', 2.5],
  [12, 'Bb', 3],
  [15, 'FA', 2.5],
  [17.5, 'G7', 2],
  [19.5, 'C7', 2],
  // Chorus
  [21.5, 'Dm', 3],
  [24.5, 'G7', 3],
  [27.5, 'C7', 3],
  [30.5, 'F', 3.5],
  // Chorus repeat
  [34, 'Bb', 3],
  [37, 'FA', 2.5],
  [39.5, 'Dm', 3],
  [42.5, 'G7', 3],
  [45.5, 'C7', 3],
  [48.5, 'F', 4],
];

let audioCtx = null;
let isPlaying = false;

function createReverb(ctx) {
  const convolver = ctx.createConvolver();
  const rate = ctx.sampleRate;
  const length = rate * 1.5;
  const impulse = ctx.createBuffer(2, length, rate);
  for (let ch = 0; ch < 2; ch++) {
    const data = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.5);
    }
  }
  convolver.buffer = impulse;
  return convolver;
}

function playMelodyNote(ctx, dest, freq, startTime, dur) {
  // Warm tone: sine + quiet triangle an octave up
  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const gain1 = ctx.createGain();
  const gain2 = ctx.createGain();

  osc1.type = 'sine';
  osc1.frequency.value = freq;
  osc2.type = 'triangle';
  osc2.frequency.value = freq * 2;

  const d = dur * BEAT;
  // Main voice
  gain1.gain.setValueAtTime(0, startTime);
  gain1.gain.linearRampToValueAtTime(0.18, startTime + 0.05);
  gain1.gain.setValueAtTime(0.18, startTime + d * 0.6);
  gain1.gain.exponentialRampToValueAtTime(0.001, startTime + d);
  // Harmonic shimmer
  gain2.gain.setValueAtTime(0, startTime);
  gain2.gain.linearRampToValueAtTime(0.04, startTime + 0.05);
  gain2.gain.exponentialRampToValueAtTime(0.001, startTime + d);

  osc1.connect(gain1); gain1.connect(dest);
  osc2.connect(gain2); gain2.connect(dest);
  osc1.start(startTime); osc1.stop(startTime + d + 0.1);
  osc2.start(startTime); osc2.stop(startTime + d + 0.1);
}

function playChord(ctx, dest, freqs, startTime, dur) {
  const d = dur * BEAT;
  freqs.forEach(freq => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.045, startTime + 0.1);
    gain.gain.setValueAtTime(0.045, startTime + d * 0.7);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + d);
    osc.connect(gain); gain.connect(dest);
    osc.start(startTime); osc.stop(startTime + d + 0.1);
  });
}

function playMusic() {
  if (isPlaying) return;
  isPlaying = true;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Reverb chain
  const reverb = createReverb(audioCtx);
  const dryGain = audioCtx.createGain();
  const wetGain = audioCtx.createGain();
  dryGain.gain.value = 0.8;
  wetGain.gain.value = 0.3;
  dryGain.connect(audioCtx.destination);
  reverb.connect(wetGain);
  wetGain.connect(audioCtx.destination);

  // Mix node
  const mix = audioCtx.createGain();
  mix.connect(dryGain);
  mix.connect(reverb);

  const t0 = audioCtx.currentTime + 0.2;

  // Schedule melody
  let beatPos = 0;
  fullMelody.forEach(([note, dur]) => {
    if (note) playMelodyNote(audioCtx, mix, note, t0 + beatPos * BEAT, dur);
    beatPos += dur;
  });

  // Schedule chords
  chordSchedule.forEach(([beat, name, dur]) => {
    const ch = CHORDS[name];
    if (ch) playChord(audioCtx, mix, ch, t0 + beat * BEAT, dur);
  });

  // EQ animation
  startEq();
  const totalBeats = beatPos;
  setTimeout(() => {
    isPlaying = false;
    stopEq();
  }, totalBeats * BEAT * 1000 + 1000);
}

// ── UI ──
const eqBars = document.querySelectorAll('.eq-bar');
let eqInterval = null;

function startEq() {
  if (eqInterval) return;
  eqInterval = setInterval(() => {
    eqBars.forEach(bar => {
      bar.style.height = (4 + Math.random() * 22) + 'px';
    });
  }, 120);
}
function stopEq() {
  clearInterval(eqInterval);
  eqInterval = null;
  eqBars.forEach(bar => bar.style.height = '4px');
}

function spawnNotes() {
  const symbols = ['♪', '♫', '♬', '♩', '🎵', '🎶'];
  for (let i = 0; i < 8; i++) {
    const el = document.createElement('div');
    el.className = 'note';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.left = (10 + Math.random() * 80) + 'vw';
    el.style.top = (50 + Math.random() * 40) + 'vh';
    el.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}

let started = false;
document.getElementById('overlay').addEventListener('click', () => {
  if (started) return;
  started = true;
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('card').classList.add('visible');
  setTimeout(() => { playMusic(); spawnNotes(); }, 600);
});

document.getElementById('card').addEventListener('click', (e) => {
  if (e.target.closest('.gallery-card')) return;
  playMusic();
  spawnNotes();
});
</script>
</body>
</html>
