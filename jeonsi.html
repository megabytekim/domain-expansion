<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0a0a;
    color: #f5f0e8;
    font-family: 'Noto Serif KR', serif;
    overflow-x: hidden;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* 클릭 전 오버레이 */
  .click-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: #0a0a0a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  .click-overlay.hidden {
    opacity: 0; visibility: hidden; pointer-events: none;
  }
  .click-overlay .prompt {
    font-size: clamp(1.2rem, 3vw, 2rem);
    color: #f5f0e8;
    letter-spacing: 0.3em;
    animation: pulse 2s ease-in-out infinite;
  }
  .click-overlay .emoji {
    font-size: 4rem;
    margin-bottom: 2rem;
    animation: bounce 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  /* 메인 카드 */
  .invitation {
    max-width: 560px;
    width: 90%;
    padding: 3rem 2.5rem;
    background: linear-gradient(145deg, #1a1714, #0f0d0b);
    border: 1px solid #3a3530;
    border-radius: 2px;
    position: relative;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1s ease 0.3s, transform 1s ease 0.3s;
  }
  .invitation.visible {
    opacity: 1; transform: translateY(0);
  }

  .invitation::before {
    content: '';
    position: absolute; inset: 8px;
    border: 1px solid #2a2520;
    border-radius: 1px;
    pointer-events: none;
  }

  .date-line {
    text-align: center;
    font-size: 0.85rem;
    letter-spacing: 0.5em;
    color: #8a7e6e;
    text-transform: uppercase;
    margin-bottom: 2rem;
  }

  h1 {
    font-family: 'Playfair Display', 'Noto Serif KR', serif;
    font-size: clamp(2.5rem, 7vw, 3.8rem);
    text-align: center;
    line-height: 1.2;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #f5f0e8, #c4a76c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    text-align: center;
    font-size: 1.1rem;
    color: #c4a76c;
    margin-bottom: 2.5rem;
    font-style: italic;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: #c4a76c;
    margin: 0 auto 2.5rem;
  }

  /* 갤러리 카드 */
  .galleries {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    margin-bottom: 2.5rem;
  }

  .gallery-card {
    display: block;
    padding: 1.4rem 1.6rem;
    background: rgba(196, 167, 108, 0.06);
    border: 1px solid #2a2520;
    border-radius: 2px;
    text-decoration: none;
    color: #f5f0e8;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .gallery-card:hover {
    border-color: #c4a76c;
    background: rgba(196, 167, 108, 0.12);
    transform: translateX(4px);
  }
  .gallery-card::after {
    content: '\2197';
    position: absolute;
    right: 1.4rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.2rem;
    color: #c4a76c;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .gallery-card:hover::after { opacity: 1; }

  .gallery-card .num {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: #c4a76c;
    margin-bottom: 0.4rem;
  }
  .gallery-card .name {
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .gallery-card .desc {
    font-size: 0.82rem;
    color: #8a7e6e;
  }

  .footer-note {
    text-align: center;
    font-size: 0.8rem;
    color: #5a5347;
    line-height: 1.8;
  }

  /* 음표 파티클 */
  .note {
    position: fixed;
    font-size: 1.6rem;
    pointer-events: none;
    z-index: 50;
    animation: float-up 3s ease-out forwards;
  }
  @keyframes float-up {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-300px) rotate(360deg); }
  }

  /* 이퀄라이저 */
  .equalizer {
    display: flex;
    gap: 3px;
    justify-content: center;
    margin-bottom: 1.5rem;
    height: 30px;
    align-items: flex-end;
  }
  .eq-bar {
    width: 4px;
    background: #c4a76c;
    border-radius: 2px;
    transition: height 0.1s;
  }

  .music-label {
    text-align: center;
    font-size: 0.75rem;
    color: #5a5347;
    letter-spacing: 0.2em;
    margin-bottom: 2rem;
  }

</style>
</head>
<body>

<!-- 클릭 유도 -->
<div class="click-overlay" id="overlay">
  <div class="emoji">🖼️</div>
  <div class="prompt">아무 데나 누르세요</div>
</div>

<!-- 초대장 -->
<div class="invitation" id="card">
  <div class="date-line">2025. 4. 25. SAT &middot; 압구정</div>

  <h1>전시번개</h1>
  <p class="subtitle">4월 옥션 번개</p>

  <div class="divider"></div>

  <div class="equalizer" id="eq">
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>
  </div>
  <div class="music-label" id="musicLabel">Joe Dassin — Les Champs-Elysees</div>

  <div class="galleries">
    <a class="gallery-card" href="https://www.k-auction.com/" target="_blank" rel="noopener">
      <div class="num">STOP 01</div>
      <div class="name">K옥션 프리뷰</div>
      <div class="desc">압구정 &middot; 4/18 - 4/29 프리뷰 기간</div>
    </a>
    <a class="gallery-card" href="https://www.perrotin.com/en" target="_blank" rel="noopener">
      <div class="num">STOP 02</div>
      <div class="name">페로탕 서울 10주년</div>
      <div class="desc">박서보, 무라카미 다카시 등 소속 작가 총출동 &middot; 10th Anniversary</div>
    </a>
  </div>

  <div class="divider"></div>

  <div class="footer-note">
    관람 전후로 프랑스 식 식사 한 끼<br>
    그림 보고 밥 먹자<br>
    <span style="font-size:1.2rem">🥂</span>
  </div>
</div>

<script>
// ── Les Champs-Élysées — warm synth (Key: G major) ──
// Reference: chord progression G-E7-Em-G7-C-G-A7-D7 (verse), G-B7-Em-G7-C-G-D7-G (chorus)

const F = {
  G3:196.00, A3:220.00, B3:246.94, C4:261.63, D4:293.66, E4:329.63,
  F4:349.23, Fs4:369.99, G4:392.00, A4:440.00, B4:493.88,
  C5:523.25, D5:587.33, E5:659.25, Fs5:739.99, G5:783.99
};

// Chord voicings (root + intervals)
const CHORDS = {
  G:  [F.G3, F.B3, F.D4],
  E7: [F.E4, F.Gs4=415.30, F.B4],
  Em: [F.E4, F.G4, F.B4],
  G7: [F.G3, F.B3, F.F4],
  C:  [F.C4, F.E4, F.G4],
  A7: [F.A3, F.Cs4=277.18, F.E4],
  D7: [F.D4, F.Fs4, F.A4],
  B7: [F.B3, F.Ds4=311.13, F.Fs4],
};

// Melody: verse + chorus (note, duration in beats)
// Tempo: ~100 BPM → beat = 0.6s (느리게)
const BEAT = 0.48;

const verse = [
  // "Je m'ba-la-dais sur l'a-ve-nue" (G)
  [F.B4,1],[F.B4,0.5],[F.D5,0.5],[F.E5,0.5],[F.Fs5,1],[F.E5,0.5],[F.D5,1],
  // "le cœur ou-vert à l'in-con-nu" (E7 → Em)
  [null,0.5],[F.E5,0.5],[F.D5,0.5],[F.B4,0.5],[F.A4,0.5],[F.B4,1.5],
  [null,0.5],
  // "j'a-vais en-vie de dire bon-jour" (G7 → C)
  [F.B4,1],[F.B4,0.5],[F.D5,0.5],[F.E5,0.5],[F.Fs5,1],[F.E5,0.5],[F.D5,1],
  // "à n'im-por-te qui" (A7 → D7)
  [null,0.5],[F.E5,0.5],[F.Fs5,0.5],[F.G5,1],[F.Fs5,1.5],
  [null,1],
];

const chorus = [
  // "Aux Champs-É-ly-sé-es" (G → B7)
  [F.G5,0.8],[F.Fs5,0.6],[F.E5,0.6],[F.D5,0.6],[F.E5,1.4],[null,0.5],
  // "aux Champs-É-ly-sé-es" (Em → G7)
  [F.Fs5,0.8],[F.E5,0.6],[F.D5,0.6],[F.C5,0.6],[F.D5,1.4],[null,0.5],
  // "Au so-leil, sous la pluie" (C → G)
  [F.E5,0.8],[F.D5,0.6],[F.C5,0.6],[F.B4,0.6],[F.C5,1.4],[null,0.5],
  // "à mi-di ou à mi-nuit" (D7 → G)
  [F.D5,0.6],[F.C5,0.6],[F.B4,0.6],[F.A4,0.6],[F.B4,1.8],[null,0.8],

  // Repeat chorus
  [F.G5,0.8],[F.Fs5,0.6],[F.E5,0.6],[F.D5,0.6],[F.E5,1.4],[null,0.5],
  [F.Fs5,0.8],[F.E5,0.6],[F.D5,0.6],[F.C5,0.6],[F.D5,1.4],[null,0.5],
  [F.E5,0.8],[F.D5,0.6],[F.C5,0.6],[F.B4,0.6],
  [F.C5,0.6],[F.D5,0.6],[F.E5,0.6],[F.D5,0.6],[F.C5,0.6],[F.B4,0.6],[F.G4,2.0],
];

const fullMelody = [...verse, ...chorus];

// Chord schedule (beat position, chord name, duration in beats)
const chordSchedule = [
  // Verse
  [0, 'G', 4.5],
  [4.5, 'E7', 2.5], [7, 'Em', 2.5],
  [9.5, 'G7', 2.5], [12, 'C', 4],
  [16, 'A7', 2], [18, 'D7', 3],
  // Chorus
  [21, 'G', 3], [24, 'B7', 3.5],
  [27.5, 'Em', 3], [30.5, 'G7', 3.5],
  [34, 'C', 3], [37, 'G', 3.5],
  [40.5, 'D7', 3], [43.5, 'G', 4],
  // Chorus repeat
  [47.5, 'G', 3], [50.5, 'B7', 3.5],
  [54, 'Em', 3], [57, 'G7', 3.5],
  [60.5, 'C', 3], [63.5, 'G', 2],
  [65.5, 'D7', 3], [68.5, 'G', 3],
];

let audioCtx = null;
let isPlaying = false;

function createReverb(ctx) {
  const convolver = ctx.createConvolver();
  const rate = ctx.sampleRate;
  const length = rate * 1.5;
  const impulse = ctx.createBuffer(2, length, rate);
  for (let ch = 0; ch < 2; ch++) {
    const data = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.5);
    }
  }
  convolver.buffer = impulse;
  return convolver;
}

function playMelodyNote(ctx, dest, freq, startTime, dur) {
  // Warm tone: sine + quiet triangle an octave up
  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const gain1 = ctx.createGain();
  const gain2 = ctx.createGain();

  osc1.type = 'sine';
  osc1.frequency.value = freq;
  osc2.type = 'triangle';
  osc2.frequency.value = freq * 2;

  const d = dur * BEAT;
  // Main voice
  gain1.gain.setValueAtTime(0, startTime);
  gain1.gain.linearRampToValueAtTime(0.18, startTime + 0.05);
  gain1.gain.setValueAtTime(0.18, startTime + d * 0.6);
  gain1.gain.exponentialRampToValueAtTime(0.001, startTime + d);
  // Harmonic shimmer
  gain2.gain.setValueAtTime(0, startTime);
  gain2.gain.linearRampToValueAtTime(0.04, startTime + 0.05);
  gain2.gain.exponentialRampToValueAtTime(0.001, startTime + d);

  osc1.connect(gain1); gain1.connect(dest);
  osc2.connect(gain2); gain2.connect(dest);
  osc1.start(startTime); osc1.stop(startTime + d + 0.1);
  osc2.start(startTime); osc2.stop(startTime + d + 0.1);
}

function playChord(ctx, dest, freqs, startTime, dur) {
  const d = dur * BEAT;
  freqs.forEach(freq => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.045, startTime + 0.1);
    gain.gain.setValueAtTime(0.045, startTime + d * 0.7);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + d);
    osc.connect(gain); gain.connect(dest);
    osc.start(startTime); osc.stop(startTime + d + 0.1);
  });
}

function playMusic() {
  if (isPlaying) return;
  isPlaying = true;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Reverb chain
  const reverb = createReverb(audioCtx);
  const dryGain = audioCtx.createGain();
  const wetGain = audioCtx.createGain();
  dryGain.gain.value = 0.8;
  wetGain.gain.value = 0.3;
  dryGain.connect(audioCtx.destination);
  reverb.connect(wetGain);
  wetGain.connect(audioCtx.destination);

  // Mix node
  const mix = audioCtx.createGain();
  mix.connect(dryGain);
  mix.connect(reverb);

  const t0 = audioCtx.currentTime + 0.2;

  // Schedule melody
  let beatPos = 0;
  fullMelody.forEach(([note, dur]) => {
    if (note) playMelodyNote(audioCtx, mix, note, t0 + beatPos * BEAT, dur);
    beatPos += dur;
  });

  // Schedule chords
  chordSchedule.forEach(([beat, name, dur]) => {
    const ch = CHORDS[name];
    if (ch) playChord(audioCtx, mix, ch, t0 + beat * BEAT, dur);
  });

  // EQ animation
  startEq();
  const totalBeats = beatPos;
  setTimeout(() => {
    isPlaying = false;
    stopEq();
  }, totalBeats * BEAT * 1000 + 1000);
}

// ── UI ──
const eqBars = document.querySelectorAll('.eq-bar');
let eqInterval = null;

function startEq() {
  if (eqInterval) return;
  eqInterval = setInterval(() => {
    eqBars.forEach(bar => {
      bar.style.height = (4 + Math.random() * 22) + 'px';
    });
  }, 120);
}
function stopEq() {
  clearInterval(eqInterval);
  eqInterval = null;
  eqBars.forEach(bar => bar.style.height = '4px');
}

function spawnNotes() {
  const symbols = ['♪', '♫', '♬', '♩', '🎵', '🎶'];
  for (let i = 0; i < 8; i++) {
    const el = document.createElement('div');
    el.className = 'note';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.left = (10 + Math.random() * 80) + 'vw';
    el.style.top = (50 + Math.random() * 40) + 'vh';
    el.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}

let started = false;
document.getElementById('overlay').addEventListener('click', () => {
  if (started) return;
  started = true;
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('card').classList.add('visible');
  setTimeout(() => { playMusic(); spawnNotes(); }, 600);
});

document.getElementById('card').addEventListener('click', (e) => {
  if (e.target.closest('.gallery-card')) return;
  playMusic();
  spawnNotes();
});
</script>
</body>
