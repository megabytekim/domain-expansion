name: Weekly Data Crawl

on:
  schedule:
    - cron: '0 0 * * 1'  # 매주 월요일 00:00 UTC (한국 09:00)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  crawl:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unesco

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: unesco/package-lock.json

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Crawl Hyecho packages
        run: npx tsx scripts/crawl-all-hyecho.ts
        timeout-minutes: 40

      - name: Fetch UNESCO sites
        run: npx tsx scripts/fetch-unesco.ts
        timeout-minutes: 3

      - name: Enrich missing locations
        run: npx tsx scripts/enrich-locations.ts
        timeout-minutes: 3

      - name: Check for data changes
        id: changes
        run: |
          git diff --name-only -- data/ | head -20
          if git diff --quiet -- data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: weekly data refresh $(date +%Y-%m-%d)"
          git push
